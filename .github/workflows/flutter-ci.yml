name: Flutter CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Use Firebase options template for CI
        run: cp lib/firebase_options.example.dart lib/firebase_options.dart

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test (if present)
        run: |
          if [ -d test ]; then
            flutter test
          else
            echo "No test directory. Skipping flutter test."
          fi
